name: 打包 rscanner (Tauri)

on:
  push:
    tags:
      - 'rscanner-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        working-directory: rscanner
        run: npm install

      - name: 编译 Windows portable exe
        working-directory: rscanner
        run: cargo tauri build --no-bundle
        env:
          CARGO_BUILD_JOBS: 4

      - name: 重命名为便携版
        shell: pwsh
        working-directory: rscanner
        run: |
          Copy-Item "target\release\rscanner.exe" -Destination "违规软件检测工具-V6.exe"

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: rscanner-windows-portable
          path: rscanner/违规软件检测工具-V6.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        working-directory: rscanner
        run: npm install

      - name: 编译 macOS .app
        working-directory: rscanner
        run: cargo tauri build --no-bundle
        env:
          CARGO_BUILD_JOBS: 4

      - name: 打包为 zip（双击即用）
        working-directory: rscanner/target/release/bundle/macos
        run: |
          cd ..
          zip -r "违规软件检测工具-V6-mac.zip" "违规软件检测工具.app"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: rscanner-macos-portable
          path: rscanner/target/release/bundle/违规软件检测工具-V6-mac.zip
