name: 打包 rscanner macOS

on:
  push:
    tags:
      - 'rscanner-v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rscanner/target
          key: macos-tauri-${{ hashFiles('rscanner/Cargo.lock') }}
          restore-keys: macos-tauri-

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        working-directory: rscanner
        run: npm install

      - name: 编译 macOS .app
        working-directory: rscanner
        run: cargo tauri build
        env:
          CARGO_BUILD_JOBS: 4

      - name: 打包为 zip（双击即用）
        working-directory: rscanner/src-tauri/target/release/bundle/macos
        run: |
          zip -r "违规软件检测工具-V6-mac.zip" "违规软件检测工具.app"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: rscanner-macos-portable
          path: rscanner/src-tauri/target/release/bundle/macos/违规软件检测工具-V6-mac.zip
